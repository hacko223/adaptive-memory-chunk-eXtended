name: Stress Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      chunks:
        description: "Chunks for the bulk write/read stage"
        required: false
        default: "3000"
      threads:
        description: "Concurrent threads for read/write race stages"
        required: false
        default: "12"
      big_mb:
        description: "Size in MB for the large single-chunk stage"
        required: false
        default: "25"
      messages:
        description: "Messages for the SmartMemory stage"
        required: false
        default: "4000"
  schedule:
    # Weekly heavier run, Monday 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  stress:
    name: Stress test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Checkout Add-ons branch (C++ accelerator sources)
        uses: actions/checkout@v4
        with:
          ref: Add-ons
          path: addons-src

      - name: Build native accelerators from source
        run: |
          mkdir -p accel
          g++ -shared -fPIC -O2 -o accel/amcx_sha1.so  "addons-src/Source code/amcx_sha1.cpp"
          g++ -shared -fPIC -O2 -o accel/amcx_xor.so   "addons-src/Source code/amcx_xor.cpp"
          g++ -shared -fPIC -O2 -o accel/amcx_accel.so "addons-src/Source code/amcx_accel.cpp"
          g++ -shared -fPIC -O2 -o accel/amcx_crc32.so "addons-src/Source code/amcx_crc32.cpp"
          ls -la accel/

      - name: Run stress test (PR / push — light load)
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: |
          python tests/stress_test.py \
            --chunks 1000 --threads 8 --big-mb 15 --messages 1500 \
            --accelerator-dir accel \
            --json stress-report.json

      - name: Run stress test (manual dispatch — custom load)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python tests/stress_test.py \
            --chunks "${{ github.event.inputs.chunks }}" \
            --threads "${{ github.event.inputs.threads }}" \
            --big-mb "${{ github.event.inputs.big_mb }}" \
            --messages "${{ github.event.inputs.messages }}" \
            --accelerator-dir accel \
            --json stress-report.json

      - name: Run stress test (weekly schedule — heavy load)
        if: github.event_name == 'schedule'
        run: |
          python tests/stress_test.py \
            --chunks 8000 --threads 24 --big-mb 60 --messages 10000 \
            --accelerator-dir accel \
            --json stress-report.json

      - name: Upload stress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report-py${{ matrix.python-version }}
          path: stress-report.json
          retention-days: 30
